<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="sitePageTitle">Edit Profile - Universalmovies</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/pages/profile/edit-profile.css">
</head>

<body>
    <div class="main-wrapper">
        <div class="header">
            <a href="/profile" class="back-btn">&lsaquo;</a>
            <h1>Edit Profile</h1>
        </div>

        <div class="page-content">
            <div class="form-container">
                <div class="profile-pic-edit" id="profilePicContainer">
                    <div class="logo-icon" id="defaultPic">👤</div>
                    <img id="profilePicPreview" src="" alt="Profile Picture" style="display: none;">
                    <div class="edit-overlay">Change Photo</div>
                    <input type="file" id="profilePicInput" accept="image/*" style="display: none;">
                </div>

                <div class="msg-box error" id="errorMsg"></div>
                <div class="msg-box success" id="successMsg"></div>

                <form id="editForm" onsubmit="handleUpdate(event)">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="editEmail" disabled style="background-color: #f5f5f5; color: #888;">
                        <div class="input-note">Email cannot be changed</div>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="editUsername" disabled style="background-color: #f5f5f5; color: #888;">
                        <div class="input-note">Username is permanent</div>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="editFullName" placeholder="Enter your full name" required>
                    </div>
                    <button type="submit" class="submit-btn recharge">Save Changes</button>
                </form>
            </div>

            <div class="info-box">
                <p><strong>Security Tip:</strong> To change your password, please go to the <a
                        href="/change-password"
                        style="color: #e91e63; text-decoration: none; font-weight: 600;">Security Settings</a>.</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js" defer>
    <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js" defer></script>
    <script src="/userdata.js" defer></script>
    <script src="/pages/profile/edit-profile.js" defer></script>
</body>

</html>
