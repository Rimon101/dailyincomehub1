<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="sitePageTitle">Edit Profile - Daily Income Hub</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/pages/profile/edit-profile.css">
</head>

<body>
    <div class="main-wrapper">
        <div class="header">
            <a href="/profile" class="back-btn">&lsaquo;</a>
            <h1>Edit Profile</h1>
        </div>

        <div class="page-content">
            <div class="form-container">
                <div class="profile-pic-edit" id="profilePicContainer">
                    <div class="logo-icon" id="defaultPic" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg></div>
                    <img id="profilePicPreview" src="" alt="Profile Picture" style="display: none;">
                    <div class="edit-overlay">Change Photo</div>
                    <input type="file" id="profilePicInput" accept="image/*" style="display: none;">
                </div>

                <div class="msg-box error" id="errorMsg"></div>
                <div class="msg-box success" id="successMsg"></div>

                <form id="editForm" onsubmit="handleUpdate(event)">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="editEmail" disabled style="background-color: #f5f5f5; color: #888;">
                        <div class="input-note">Email cannot be changed</div>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="editUsername" disabled style="background-color: #f5f5f5; color: #888;">
                        <div class="input-note">Username is permanent</div>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="editFullName" placeholder="Enter your full name" required>
                    </div>
                    <button type="submit" class="submit-btn recharge">Save Changes</button>
                </form>
            </div>

            <div class="info-box">
                <p><strong>Security Tip:</strong> To change your password, please go to the <a
                        href="/change-password"
                        style="color: #e91e63; text-decoration: none; font-weight: 600;">Security Settings</a>.</p>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="/" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></span><span class="nav-label">Home</span>
            </a>
            <a href="/tasks" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg></span><span class="nav-label">Order</span>
            </a>
            <a href="/trust" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3l8 3v6c0 5-3.5 8.5-8 9-4.5-.5-8-4-8-9V6l8-3z"/><path d="M9 12l2 2 4-4"/></svg></span><span class="nav-label">Trust</span>
            </a>
            <a href="/service" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 13a8 8 0 0 1 16 0v4a2 2 0 0 1-2 2h-2v-7h4"/><path d="M4 13v4a2 2 0 0 0 2 2h2v-7H4"/></svg></span><span class="nav-label">Service</span>
            </a>
            <a href="/profile" class="nav-item active">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg></span><span class="nav-label">Profile</span>
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js" defer></script>
    <script src="/userdata.js" defer></script>
    <script src="/pages/profile/edit-profile.js" defer></script>
</body>

</html>
