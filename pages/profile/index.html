<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="sitePageTitle">Profile - Daily Income Hub</title>
    <link rel="stylesheet" href="/styles.css?v=2">
    <link rel="stylesheet" href="/pages/profile/profile.css?v=3">
</head>

<body>
    <div class="main-wrapper">
        <div class="profile-header">
            <div class="profile-pic-container" id="profilePicContainer">
                <div class="logo-icon" id="defaultPic" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg></div>
                <img id="profilePicPreview" src="" alt="Profile Picture" style="display: none;">
                <div class="edit-overlay">Edit</div>
                <input type="file" id="profilePicInput" accept="image/*" style="display: none;">
            </div>
            <h2 id="displayUsername">Loading...</h2>
            <p id="displayEmail" style="opacity: 0.8; font-size: 14px;">loading...</p>
        </div>

        <!-- Custom Profile Balance Card -->
        <div class="custom-profile-section">
            <div class="cp-title"><span class="yellow-bar"></span>Profile</div>
            <div class="cp-card">
                <div class="cp-bg-pattern"></div>
                <div class="cp-usdt">USDT</div>
                <div class="cp-invite">
                    <span>Invitation Code</span>
                    <div class="cp-invite-code">
                        <span id="cpInviteCode">------</span>
                        <span class="cp-copy-icon" onclick="copyInviteCode()">Copy</span>
                    </div>
                </div>
                <div class="cp-balance" id="cpBalance">$0.0000</div>
                
                <div class="cp-divider"></div>
                
                <div class="cp-actions">
                    <a href="/recharge" class="cp-action-btn cp-recharge">Recharge</a>
                    <div class="cp-vertical-divider"></div>
                    <a href="/withdrawal" class="cp-action-btn cp-withdraw">Withdraw</a>
                </div>
            </div>
        </div>

        <div class="nav-menu">
            <a href="/edit-profile" class="menu-item">
                <span class="menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg></span>
                <span class="menu-label">My Profile</span>
                <span class="menu-chevron">&rsaquo;</span>
            </a>
            <a href="/team" class="menu-item">
                <span class="menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.5"/><path d="M2 21c.6-3.6 3.6-5.5 7-5.5s6.4 1.9 7 5.5"/><circle cx="17" cy="9" r="2.8"/><path d="M14 14c2.6-.4 6.4.8 8 4"/></svg></span>
                <span class="menu-label">My Team</span>
                <span class="menu-chevron">&rsaquo;</span>
            </a>
            <a href="/bind-wallet" class="menu-item" id="bindWalletMenuBtn" style="display: none;">
                <span class="menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M10 14a4 4 0 0 0 5.7 0l3-3a4 4 0 1 0-5.7-5.7l-1 1"/><path d="M14 10a4 4 0 0 0-5.7 0l-3 3a4 4 0 1 0 5.7 5.7l1-1"/></svg></span>
                <span class="menu-label">Bind Wallet</span>
                <span class="menu-chevron">&rsaquo;</span>
            </a>
            <a href="/withdraw-management" class="menu-item" id="withdrawManagementBtn" style="display: none;">
                <span class="menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><line x1="3" y1="11" x2="21" y2="11"/></svg></span>
                <span class="menu-label">Withdraw Management</span>
                <span class="menu-chevron">&rsaquo;</span>
            </a>
            <a href="/history" class="menu-item">
                <span class="menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M12 7v5l3 2"/></svg></span>
                <span class="menu-label">Transaction History</span>
                <span class="menu-chevron">&rsaquo;</span>
            </a>
            <a href="/change-password" class="menu-item">
                <span class="menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg></span>
                <span class="menu-label">Change Password</span>
                <span class="menu-chevron">&rsaquo;</span>
            </a>
            <a href="/language" class="menu-item">
                <span class="menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18"/><path d="M12 3a14 14 0 0 0 0 18"/></svg></span>
                <span class="menu-label">Language</span>
                <span class="menu-chevron">&rsaquo;</span>
            </a>
            <a href="/service" class="menu-item">
                <span class="menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 13a8 8 0 0 1 16 0v4a2 2 0 0 1-2 2h-2v-7h4"/><path d="M4 13v4a2 2 0 0 0 2 2h2v-7H4"/></svg></span>
                <span class="menu-label">Customer Service</span>
                <span class="menu-chevron">&rsaquo;</span>
            </a>
        </div>

        <div id="authStatusBtn" class="logout-btn" onclick="handleAuthAction()">Log Out</div>

        <div class="bottom-nav">
            <a href="/" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></span>
                <span class="nav-label">Home</span>
            </a>
            <a href="/tasks" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg></span>
                <span class="nav-label">Order</span>
            </a>
            <a href="/trust" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3l8 3v6c0 5-3.5 8.5-8 9-4.5-.5-8-4-8-9V6l8-3z"/><path d="M9 12l2 2 4-4"/></svg></span>
                <span class="nav-label">Trust</span>
            </a>
            <a href="/service" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 13a8 8 0 0 1 16 0v4a2 2 0 0 1-2 2h-2v-7h4"/><path d="M4 13v4a2 2 0 0 0 2 2h2v-7H4"/></svg></span>
                <span class="nav-label">Service</span>
            </a>
            <a href="/profile" class="nav-item active">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg></span>
                <span class="nav-label">Profile</span>
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js" defer></script>
    <script src="/userdata.js?v=2" defer></script>
    <script src="/pages/profile/profile.js?v=5" defer></script>
</body>

</html>
