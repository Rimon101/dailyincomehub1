<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="sitePageTitle">Withdrawal - Daily Income Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=3">
    <link rel="stylesheet" href="/pages/withdrawal/withdrawal.css?v=3">
</head>

<body>
    <div class="main-wrapper">
        <div class="header">
            <a href="/" class="back-btn">&lsaquo;</a>
            <h1>Withdrawal</h1>
        </div>


        <div class="page-content">
            <div class="balance-card">
                <div class="label">Available Balance</div>
                <div class="amount">$0.00</div>
            </div>



            <div class="form-container">
                <div class="form-group">
                    <label for="withdrawAmount">Withdrawal Amount (USD)</label>
                    <div class="amount-input-wrap">
                        <span class="amount-prefix">$</span>
                        <input type="number" id="withdrawAmount" placeholder="Enter amount" min="100" step="0.01">
                        <button type="button" class="btn-all" onclick="withdrawAll()">Withdraw All</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="walletAddress">Wallet Address / Account Number</label>
                    <input type="text" id="walletAddress" placeholder="Enter your wallet address or account number" readonly class="readonly-input">
                    <div class="input-note">Configured in Profile Settings</div>
                </div>
                <div class="form-group">
                    <label for="securityPassword">Withdraw Password</label>
                    <input type="password" id="securityPassword" placeholder="Enter withdraw password">
                </div>
                <button class="submit-btn withdraw" onclick="submitWithdrawal()">Submit</button>
            </div>

        </div>

        <div class="bottom-nav">
            <a href="/" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></span><span class="nav-label">Home</span>
            </a>
            <a href="/tasks" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg></span><span class="nav-label">Order</span>
            </a>
            <a href="/trust" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3l8 3v6c0 5-3.5 8.5-8 9-4.5-.5-8-4-8-9V6l8-3z"/><path d="M9 12l2 2 4-4"/></svg></span><span class="nav-label">Trust</span>
            </a>
            <a href="/service" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 13a8 8 0 0 1 16 0v4a2 2 0 0 1-2 2h-2v-7h4"/><path d="M4 13v4a2 2 0 0 0 2 2h2v-7H4"/></svg></span><span class="nav-label">Service</span>
            </a>
            <a href="/profile" class="nav-item">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg></span><span class="nav-label">Profile</span>
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js" defer></script>
    <script src="/userdata.js?v=3" defer></script>
    <script src="/pages/withdrawal/withdrawal.js?v=4" defer></script>
</body>

</html>
