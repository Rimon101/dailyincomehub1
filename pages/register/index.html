<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Income Hub - Register</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/pages/auth.css">
    <link rel="stylesheet" href="/pages/register/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        /* intl-tel-input overrides — scoped to our input box */
        .auth-body .input-box .iti { width: 100%; display: block; }

        .auth-body .input-box .iti__flag {
            background-image: url("https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/img/flags.png");
        }

        @media (min-resolution: 2x) {
            .auth-body .input-box .iti__flag {
                background-image: url("https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/img/flags@2x.png");
            }
        }

        /* Make room for the flag dropdown + dial code on the left */
        .auth-body .input-box .iti #phone,
        .auth-body .input-box .iti input[type="tel"] {
            padding: 16px 16px 16px 95px !important;
        }

        .auth-body .input-box .iti #phone:focus {
            border-color: #ff1493;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.3);
        }

        /* The library draws the flag itself, so hide our overlapping icon.
           The <i> sits BEFORE the .iti wrapper, so :has() on the parent is the right tool. */
        .auth-body .input-box:has(.iti) > i { display: none; }

        /* Style the flag dropdown to match the dark card */
        .auth-body .input-box .iti--separate-dial-code .iti__selected-flag {
            background-color: transparent;
            padding-left: 14px;
        }

        .auth-body .input-box .iti__selected-dial-code {
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        .auth-body .input-box .iti__arrow {
            border-top-color: #ccc;
        }

        .iti__country-list {
            background-color: #0f1430 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            font-family: 'Poppins', sans-serif !important;
        }

        .iti__country-name {
            color: #ffffff !important;
        }

        .iti__dial-code {
            color: rgba(255, 255, 255, 0.7) !important;
        }

        .iti__country {
            background-color: #0f1430 !important;
            color: #ffffff !important;
        }

        .iti__country:hover,
        .iti__country.iti__highlight {
            background-color: rgba(255, 20, 147, 0.2) !important;
            color: #ffffff !important;
        }
    </style>
</head>

<body class="auth-body">

    <div class="bg" aria-hidden="true">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
    </div>

    <div class="container">
        <div class="glow" aria-hidden="true"></div>
        <div class="glow2" aria-hidden="true"></div>

        <div class="login-card">

            <div class="crypto-icons" aria-hidden="true">
                <img src="/images/Bitcoin.svg?v=2" alt="Bitcoin">
                <img src="/images/eth.svg?v=2" alt="Ethereum">
                <img src="/images/usdt.svg?v=2" alt="Tether">
            </div>

            <h1>
                Join<br>
                <span>Daily Income Hub</span>
            </h1>

            <p class="subtitle">Create your secure account</p>

            <form id="registerForm" action="/register" method="post" novalidate onsubmit="handleRegister(event)">

                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <div class="input-box">
                        <i class="fa-solid fa-user" aria-hidden="true"></i>
                        <input type="text" id="fullName" name="fullName" placeholder="Enter full name" autocomplete="name">
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-box">
                        <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                        <input type="email" id="email" name="email" placeholder="Enter email" autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label for="username">Username</label>
                    <div class="input-box">
                        <i class="fa-solid fa-at" aria-hidden="true"></i>
                        <input type="text" id="username" name="username" placeholder="Choose username" autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="phone">Phone number &amp; Country</label>
                    <div class="input-box">
                        <i class="fa-solid fa-phone" aria-hidden="true"></i>
                        <input type="tel" id="phone" name="phone" autocomplete="tel">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock" aria-hidden="true"></i>
                        <input type="password" id="password" name="password" placeholder="Create password" autocomplete="new-password">
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock" aria-hidden="true"></i>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" autocomplete="new-password">
                    </div>
                </div>

                <div class="input-group">
                    <label for="referralCode">Referral Code</label>
                    <div class="input-box">
                        <i class="fa-solid fa-gift" aria-hidden="true"></i>
                        <input type="text" id="referralCode" name="referralCode" placeholder="Enter referral code (optional)">
                    </div>
                </div>

                <div class="error-msg" id="errorMsg" role="alert" aria-live="polite"></div>
                <div class="success-msg" id="successMsg" role="status" aria-live="polite"></div>

                <button type="submit" class="auth-submit">Register</button>
            </form>

            <div class="auth-switch">
                Already have an account?
                <a href="/login">Login here</a>
            </div>

            <div class="footer">
                Powered by <span>Daily Income Hub</span>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js" defer></script>
    <script src="/userdata.js?v=2" defer></script>
    <script src="/pages/register/register.js?v=2" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var phoneInputField = document.querySelector("#phone");
            if (phoneInputField && window.intlTelInput) {
                window.phoneInput = window.intlTelInput(phoneInputField, {
                    utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
                    separateDialCode: true,
                    initialCountry: "auto",
                    geoIpLookup: function (success, failure) {
                        fetch("https://ipapi.co/json")
                            .then(function (res) { return res.json(); })
                            .then(function (data) { success(data.country_code); })
                            .catch(function () { success("us"); });
                    }
                });
            }
        });
    </script>
</body>

</html>
