<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Income Hub - Register</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/pages/register/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        .iti { width: 100%; display: block; }

        .iti__flag {
            background-image: url("https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/img/flags.png");
        }

        @media (min-resolution: 2x) {
            .iti__flag {
                background-image: url("https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/img/flags@2x.png");
            }
        }

        #phone {
            width: 100%;
            padding: 16px 16px 16px 50px !important;
            border-radius: 14px !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            background: rgba(255, 255, 255, 0.04) !important;
            color: #fff !important;
            font-size: 15px !important;
            font-family: 'Poppins', sans-serif !important;
        }

        #phone:focus {
            border-color: #ff1493 !important;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.3) !important;
            outline: none !important;
        }

        .iti--separate-dial-code .iti__selected-flag {
            background-color: transparent !important;
        }
    </style>
</head>

<body class="auth-body">

    <div class="bg">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="container">
        <div class="glow"></div>
        <div class="glow2"></div>

        <div class="login-card">

            <h1>
                Join<br>
                <span>Daily Income Hub</span>
            </h1>

            <p class="subtitle">Create your secure account</p>

            <form id="registerForm" onsubmit="handleRegister(event)">

                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="fullName" placeholder="Enter full name" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Username</label>
                    <div class="input-box">
                        <i class="fa-solid fa-at"></i>
                        <input type="text" id="username" placeholder="Choose username" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Phone number &amp; Country</label>
                    <div class="input-box">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" id="phone">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Create password" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Referral Code</label>
                    <div class="input-box">
                        <i class="fa-solid fa-gift"></i>
                        <input type="text" id="referralCode" placeholder="Enter referral code (optional)">
                    </div>
                </div>

                <div class="error-msg" id="errorMsg"></div>
                <div class="success-msg" id="successMsg"></div>

                <button type="submit" class="login-btn">Register</button>
            </form>

            <div class="register">
                Already have an account?
                <a href="/login">Login here</a>
            </div>

            <div class="footer">
                Powered by <span>Daily Income Hub</span>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js" defer></script>
    <script src="/userdata.js?v=2" defer></script>
    <script src="/pages/register/register.js?v=2" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var phoneInputField = document.querySelector("#phone");
            if (phoneInputField && window.intlTelInput) {
                window.phoneInput = window.intlTelInput(phoneInputField, {
                    utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
                    separateDialCode: true,
                    initialCountry: "auto",
                    geoIpLookup: function (success, failure) {
                        fetch("https://ipapi.co/json")
                            .then(function (res) { return res.json(); })
                            .then(function (data) { success(data.country_code); })
                            .catch(function () { success("us"); });
                    }
                });
            }
        });
    </script>
</body>

</html>
