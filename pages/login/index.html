<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Income Hub - Login</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/pages/auth.css">
    <link rel="stylesheet" href="/pages/login/login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body class="auth-body">

    <div class="bg" aria-hidden="true">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
    </div>

    <div class="container">
        <div class="glow" aria-hidden="true"></div>
        <div class="glow2" aria-hidden="true"></div>

        <div class="login-card">

            <div class="crypto-icons" aria-hidden="true">
                <img src="/images/Bitcoin.svg?v=2" alt="Bitcoin">
                <img src="/images/eth.svg?v=2" alt="Ethereum">
                <img src="/images/usdt.svg?v=2" alt="Tether">
            </div>

            <h1>
                Welcome to<br>
                <span>Daily Income Hub</span>
            </h1>

            <p class="subtitle">Secure Crypto Investment Platform</p>

            <form id="loginForm" action="/login" method="post" novalidate onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="username">Username / Email</label>
                    <div class="input-box">
                        <i class="fa-solid fa-user" aria-hidden="true"></i>
                        <input type="text" id="username" name="username"
                               placeholder="Enter Username or Email" autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock" aria-hidden="true"></i>
                        <input type="password" id="password" name="password"
                               placeholder="Enter Password" autocomplete="current-password">
                    </div>
                </div>

                <div class="forgot">
                    <a href="/forgot-password">Forgot Password?</a>
                </div>

                <div class="error-msg" id="errorMsg" role="alert" aria-live="polite"></div>

                <button type="submit" class="auth-submit">Login</button>
            </form>

            <div class="auth-switch">
                Don't have an account?
                <a href="/register">Register Now</a>
            </div>

            <div class="footer">
                Powered by <span>Daily Income Hub</span>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js" defer></script>
    <script src="/userdata.js" defer></script>
    <script src="/pages/login/login.js" defer></script>
</body>

</html>
