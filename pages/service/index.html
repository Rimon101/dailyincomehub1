<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service - Universalmovies</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/pages/service/service.css">
</head>

<body>
    <div class="main-wrapper">
        <div class="header">
            <a href="/" class="back-btn">&lsaquo;</a>
            <h1>Customer Service</h1>
        </div>

        <div class="page-content">
            <div class="service-card">
                <div class="service-icon">🎧</div>
                <h3>How can we help?</h3>
                <p style="color: #666; margin-top: 10px;">Our support team is available 24/7 to assist you with any
                    questions or issues.</p>
                <a href="https://t.me/Universalmoviess22" target="_blank" class="contact-btn">Chat on Telegram</a>
            </div>

            <div class="form-container">
                <div class="section-title">FAQ</div>
                <div class="detail-row">
                    <span class="label">Withdrawal Time</span>
                    <span class="value">1-24 Hours</span>
                </div>
                <div class="detail-row">
                    <span class="label">Task Reset</span>
                    <span class="value">Daily 00:00</span>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="/" class="nav-item">
                <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
            </a>
            <a href="/tasks" class="nav-item">
                <span class="nav-icon">📋</span><span class="nav-label">Order</span>
            </a>
            <a href="/trust" class="nav-item">
                <span class="nav-icon">🛡️</span><span class="nav-label">Trust</span>
            </a>
            <a href="/service" class="nav-item active">
                <span class="nav-icon">🎧</span><span class="nav-label">Service</span>
            </a>
            <a href="/profile" class="nav-item">
                <span class="nav-icon">👤</span><span class="nav-label">Profile</span>
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js" defer>
    <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js" defer></script>
    <script src="/userdata.js" defer></script>
</body>

</html>
