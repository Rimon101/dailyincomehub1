<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Daily Income Hub</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/pages/change-password/change-password.css">
</head>

<body>
    <a href="/profile" class="back-nav">&lsaquo;</a>

    <div class="auth-container">
        <div class="auth-logo">
            <div class="logo-icon">🌻</div>
            <h2>Security Settings</h2>
        </div>

        <div class="auth-card">
            <h3>Change Password</h3>
            <div class="msg-box error" id="errorMsg"></div>
            <div class="msg-box success" id="successMsg"></div>

            <form class="auth-form" onsubmit="handleChangePassword(event)">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" placeholder="Enter current password" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmNewPassword" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="auth-submit">Change Password</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js" defer></script>
    <script src="/userdata.js" defer></script>
    <script src="/pages/change-password/change-password.js" defer></script>
</body>

</html>
